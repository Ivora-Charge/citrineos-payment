<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      window.CLIENT_API_URL = "{{ CLIENT_API_URL }}";
    </script>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon-64.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E1012" />
    <meta
      name="description"
      content="Ivora Charge — pay and start charging in seconds. No app, no account."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Ivora Charge</title>
    <style>
      html, body { min-height: 100%; margin: 0; }
      body { background-color: #0E1012; }
      .ivora-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 18px; background: #0E1012;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .ivora-boot img {
        width: 84px; height: 84px; border-radius: 22px;
        box-shadow: 0 18px 50px rgba(0,0,0,.5);
        animation: ivora-pulse 1.6s ease-in-out infinite;
      }
      .ivora-boot .wm { font-weight: 800; font-size: 20px; letter-spacing: -.01em; color: #F0EDE6; }
      .ivora-boot .wm span { color: #A8A29E; font-weight: 600; }
      @keyframes ivora-pulse { 0%,100% { opacity: .55; transform: scale(.98);} 50% { opacity: 1; transform: scale(1);} }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="ivora-boot">
        <img src="%PUBLIC_URL%/ivora-icon.png" alt="Ivora Charge" />
        <div class="wm">Ivora<span>&nbsp;Charge</span></div>
      </div>
    </div>
  </body>
</html>
