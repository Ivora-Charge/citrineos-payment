# Directus instance for citrineos-payment QR-code / Scan-and-Charge hosting.
# Sqlite-backed, listening on localhost:8055 to match CITRINEOS_DIRECTUS_URL in .env.
#   Start:  sg docker -c "docker compose -f docker-compose.directus.yml up -d"
#   Logs:   sg docker -c "docker compose -f docker-compose.directus.yml logs -f directus"
version: "3.8"
services:
  directus:
    image: directus/directus:11
    container_name: directus
    ports:
      - "8055:8055"
    volumes:
      - directus-database:/directus/database
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
    environment:
      KEY: "citrineos-payment-directus-key"
      SECRET: "citrineos-payment-directus-secret"
      ADMIN_EMAIL: "admin@citrineos.com"
      ADMIN_PASSWORD: "CitrineOS!"
      DB_CLIENT: "sqlite3"
      DB_FILENAME: "/directus/database/data.db"
      WEBSOCKETS_ENABLED: "true"
    restart: unless-stopped

volumes:
  directus-database:
  directus-uploads:
  directus-extensions:
